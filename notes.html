<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — Yoichiro Dobashi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0d0f;--bg2:#111518;--bg3:#181d21;
  --ink:#f0ede8;--ink2:#a0a8b0;--ink3:#565e68;
  --ocean:#3db8d4;--border:rgba(255,255,255,0.07);
  --serif:'Playfair Display',serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.7;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:rgba(10,13,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--mono);font-size:.75rem;color:var(--ocean);letter-spacing:.08em;text-decoration:none;}
.nav-back{font-size:.8rem;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;}
.nav-back:hover{color:var(--ink);}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:3rem;width:100%;max-width:380px;text-align:center;}
.login-icon{font-size:2rem;margin-bottom:1rem;opacity:.6;}
.login-title{font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--ink);margin-bottom:.4rem;}
.login-sub{font-size:.84rem;color:var(--ink3);margin-bottom:2rem;}
.pw-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--ink);font-family:var(--mono);font-size:.9rem;outline:none;text-align:center;letter-spacing:.1em;transition:border .2s;margin-bottom:1rem;}
.pw-input:focus{border-color:rgba(61,184,212,.4);}
.pw-input::placeholder{letter-spacing:.02em;color:var(--ink3);}
.pw-btn{width:100%;background:var(--ocean);color:#0a0d0f;border:none;border-radius:8px;padding:.75rem;font-family:var(--sans);font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.pw-btn:hover{opacity:.85;}
.pw-error{font-size:.8rem;color:#e05a5a;margin-top:.75rem;display:none;}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:8rem 3rem 5rem;}
.page-header{margin-bottom:3rem;}
.page-eyebrow{font-family:var(--mono);font-size:.7rem;color:var(--ocean);letter-spacing:.14em;text-transform:uppercase;margin-bottom:.5rem;}
.page-title{font-family:var(--serif);font-size:2.5rem;font-weight:400;color:var(--ink);}
.page-sub{font-size:.88rem;color:var(--ink3);margin-top:.4rem;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.search-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem;color:var(--ink);font-family:var(--sans);font-size:.84rem;outline:none;width:240px;transition:border .2s;}
.search-input:focus{border-color:rgba(61,184,212,.4);}
.search-input::placeholder{color:var(--ink3);}
.filter-row{display:flex;gap:6px;}
.filter-btn{font-family:var(--mono);font-size:.68rem;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--ocean);color:var(--ocean);}
.new-btn{background:var(--ocean);color:#0a0d0f;border:none;border-radius:8px;padding:.55rem 1.2rem;font-family:var(--sans);font-size:.82rem;font-weight:500;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:6px;}
.new-btn:hover{opacity:.85;}

/* NOTE CARDS */
.notes-grid{display:flex;flex-direction:column;gap:1rem;}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:border .2s,transform .15s;}
.note-card:hover{border-color:rgba(61,184,212,.3);transform:translateY(-1px);}
.note-meta{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap;}
.note-date{font-family:var(--mono);font-size:.68rem;color:var(--ink3);}
.note-tag{font-family:var(--mono);font-size:.63rem;padding:2px 8px;border-radius:3px;border:1px solid;}
.tag-idea{background:rgba(61,184,212,.08);color:var(--ocean);border-color:rgba(61,184,212,.2);}
.tag-paper{background:rgba(120,180,100,.08);color:#7ab464;border-color:rgba(120,180,100,.2);}
.tag-log{background:rgba(200,160,80,.08);color:#c8a050;border-color:rgba(200,160,80,.2);}
.tag-misc{background:rgba(160,168,176,.06);color:var(--ink3);border-color:var(--border);}
.note-title{font-family:var(--serif);font-size:1.1rem;font-weight:400;color:var(--ink);margin-bottom:.4rem;}
.note-preview{font-size:.84rem;color:var(--ink2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-footer{display:flex;align-items:center;gap:10px;margin-top:.75rem;}
.note-pdf{font-family:var(--mono);font-size:.68rem;color:var(--ink3);display:flex;align-items:center;gap:4px;}
.note-pdf svg{width:12px;height:12px;}
.note-actions{margin-left:auto;display:flex;gap:6px;opacity:0;transition:opacity .2s;}
.note-card:hover .note-actions{opacity:1;}
.action-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.7rem;color:var(--ink3);cursor:pointer;transition:all .15s;}
.action-btn:hover{border-color:var(--ocean);color:var(--ocean);}
.action-btn.del:hover{border-color:#e05a5a;color:#e05a5a;}

/* EDITOR */
.editor-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem;margin-bottom:2rem;display:none;}
.editor-wrap.open{display:block;}
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.editor-title-label{font-family:var(--mono);font-size:.68rem;color:var(--ocean);letter-spacing:.1em;text-transform:uppercase;}
.editor-close{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:1.1rem;transition:color .2s;}
.editor-close:hover{color:var(--ink);}
.editor-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.ed-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--ink);font-family:var(--sans);font-size:.85rem;outline:none;transition:border .2s;flex:1;min-width:140px;}
.ed-input:focus{border-color:rgba(61,184,212,.4);}
.ed-input::placeholder{color:var(--ink3);}
.ed-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--ink);font-family:var(--mono);font-size:.78rem;outline:none;cursor:pointer;}
.ed-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--ink);font-family:var(--mono);font-size:.82rem;outline:none;resize:vertical;min-height:220px;line-height:1.7;transition:border .2s;margin-bottom:10px;}
.ed-textarea:focus{border-color:rgba(61,184,212,.4);}
.ed-pdf-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.ed-pdf-label{font-size:.8rem;color:var(--ink3);}
.ed-pdf-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;color:var(--ink);font-family:var(--mono);font-size:.75rem;outline:none;}
.editor-actions{display:flex;justify-content:flex-end;gap:8px;}
.save-btn{background:var(--ocean);color:#0a0d0f;border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:var(--sans);font-size:.84rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.save-btn:hover{opacity:.85;}
.cancel-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:.6rem 1.2rem;font-family:var(--sans);font-size:.84rem;color:var(--ink2);cursor:pointer;transition:all .2s;}
.cancel-btn:hover{border-color:var(--ink3);}

/* NOTE DETAIL */
.note-detail{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem;margin-bottom:2rem;display:none;}
.note-detail.open{display:block;}
.detail-back{font-family:var(--mono);font-size:.72rem;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;transition:color .2s;background:transparent;border:none;}
.detail-back:hover{color:var(--ocean);}
.detail-title{font-family:var(--serif);font-size:1.8rem;font-weight:400;color:var(--ink);margin-bottom:.5rem;}
.detail-meta{display:flex;gap:10px;align-items:center;margin-bottom:1.5rem;}
.detail-body{font-family:var(--mono);font-size:.84rem;color:var(--ink2);line-height:1.85;white-space:pre-wrap;border-top:1px solid var(--border);padding-top:1.5rem;}
.detail-pdf{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.detail-pdf-label{font-family:var(--mono);font-size:.68rem;color:var(--ink3);margin-bottom:.5rem;}
.detail-pdf a{color:var(--ocean);font-size:.84rem;text-decoration:none;}
.detail-pdf a:hover{text-decoration:underline;}

.empty-state{text-align:center;padding:4rem 2rem;color:var(--ink3);}
.empty-icon{font-size:2rem;margin-bottom:1rem;opacity:.4;}
.empty-text{font-size:.88rem;}

/* EXPORT */
.export-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;display:none;}
.export-box.open{display:block;}
.export-label{font-family:var(--mono);font-size:.68rem;color:var(--ink3);margin-bottom:.5rem;}
.export-code{font-family:var(--mono);font-size:.75rem;color:var(--ink2);white-space:pre-wrap;word-break:break-all;line-height:1.6;}
.copy-btn{margin-top:.75rem;background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-family:var(--mono);font-size:.7rem;color:var(--ink3);cursor:pointer;transition:all .2s;}
.copy-btn:hover{border-color:var(--ocean);color:var(--ocean);}

@media(max-width:768px){
  nav{padding:.9rem 1.5rem;}
  .main{padding:6rem 1.5rem 3rem;}
  .toolbar{flex-direction:column;align-items:flex-start;}
  .search-input{width:100%;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">YD</a>
  <a class="nav-back" href="index.html">← Back to portfolio</a>
</nav>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🔒</div>
    <div class="login-title">Research Notes</div>
    <div class="login-sub">Enter password to access your notes</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="Password" />
    <button class="pw-btn" onclick="checkPassword()">Enter</button>
    <div class="pw-error" id="pwError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- MAIN NOTES APP -->
<div class="main" id="mainApp" style="display:none;">
  <div class="page-header">
    <div class="page-eyebrow">Private · Research Notes</div>
    <div class="page-title">My Notes</div>
    <div class="page-sub" id="noteCount"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-header">
      <div class="editor-title-label" id="editorLabel">New note</div>
      <button class="editor-close" onclick="closeEditor()">✕</button>
    </div>
    <div class="editor-row">
      <input class="ed-input" id="edTitle" placeholder="Title..." style="flex:2;" />
      <select class="ed-select" id="edTag">
        <option value="idea">💡 Idea</option>
        <option value="paper">📄 Paper</option>
        <option value="log">📋 Log</option>
        <option value="misc">📌 Misc</option>
      </select>
    </div>
    <textarea class="ed-textarea" id="edBody" placeholder="Write in Markdown...&#10;&#10;## Summary&#10;&#10;Key points:&#10;- &#10;&#10;References:&#10;-"></textarea>
    <div class="ed-pdf-row">
      <span class="ed-pdf-label">PDF filename (if any):</span>
      <input class="ed-pdf-input" id="edPdf" placeholder="e.g. dobashi2021.pdf" />
    </div>
    <div class="editor-actions">
      <button class="cancel-btn" onclick="closeEditor()">Cancel</button>
      <button class="save-btn" onclick="saveNote()">Save Note</button>
    </div>
  </div>

  <!-- NOTE DETAIL -->
  <div class="note-detail" id="noteDetail">
    <button class="detail-back" onclick="closeDetail()">← Back to notes</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-pdf" id="detailPdf" style="display:none;">
      <div class="detail-pdf-label">📎 ATTACHED PDF</div>
      <a id="detailPdfLink" href="#" target="_blank"></a>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div id="notesView">
    <div class="toolbar">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input class="search-input" id="searchInput" placeholder="Search notes..." oninput="renderNotes()" />
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('idea',this)">💡 Ideas</button>
          <button class="filter-btn" onclick="setFilter('paper',this)">📄 Papers</button>
          <button class="filter-btn" onclick="setFilter('log',this)">📋 Logs</button>
          <button class="filter-btn" onclick="setFilter('misc',this)">📌 Misc</button>
        </div>
      </div>
      <button class="new-btn" onclick="openEditor()">+ New Note</button>
    </div>

    <div class="notes-grid" id="notesGrid"></div>

    <!-- EXPORT for GitHub -->
    <div style="margin-top:2rem;">
      <button class="action-btn" onclick="toggleExport()" style="opacity:1;padding:6px 14px;font-size:.75rem;">📤 Export for GitHub</button>
      <div class="export-box" id="exportBox">
        <div class="export-label">Copy this JSON and save as notes-data.json in your GitHub repo (optional backup)</div>
        <div class="export-code" id="exportCode"></div>
        <button class="copy-btn" onclick="copyExport()">Copy to clipboard</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASS = 'dova0618';
const STORE_KEY = 'yd_research_notes';
let notes = [];
let currentFilter = 'all';
let editingId = null;

// ── AUTH ──────────────────────────────────────
function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === PASS) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadNotes();
    renderNotes();
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ── STORAGE ──────────────────────────────────
function loadNotes() {
  try { notes = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) { notes = []; }
}
function saveNotes() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); } catch(e) {}
}

// ── EDITOR ───────────────────────────────────
function openEditor(id = null) {
  editingId = id;
  const wrap = document.getElementById('editorWrap');
  document.getElementById('noteDetail').classList.remove('open');
  wrap.classList.add('open');
  if (id) {
    const n = notes.find(n => n.id === id);
    document.getElementById('editorLabel').textContent = 'Edit note';
    document.getElementById('edTitle').value = n.title;
    document.getElementById('edTag').value = n.tag;
    document.getElementById('edBody').value = n.body;
    document.getElementById('edPdf').value = n.pdf || '';
  } else {
    document.getElementById('editorLabel').textContent = 'New note';
    document.getElementById('edTitle').value = '';
    document.getElementById('edTag').value = 'idea';
    document.getElementById('edBody').value = '';
    document.getElementById('edPdf').value = '';
  }
  document.getElementById('edTitle').focus();
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeEditor() {
  document.getElementById('editorWrap').classList.remove('open');
  editingId = null;
}

function saveNote() {
  const title = document.getElementById('edTitle').value.trim();
  const body = document.getElementById('edBody').value.trim();
  if (!title) { alert('Please add a title.'); return; }
  if (editingId) {
    const n = notes.find(n => n.id === editingId);
    n.title = title;
    n.tag = document.getElementById('edTag').value;
    n.body = body;
    n.pdf = document.getElementById('edPdf').value.trim();
    n.updated = new Date().toISOString();
  } else {
    notes.unshift({
      id: Date.now(),
      title,
      tag: document.getElementById('edTag').value,
      body,
      pdf: document.getElementById('edPdf').value.trim(),
      created: new Date().toISOString(),
      updated: new Date().toISOString()
    });
  }
  saveNotes();
  closeEditor();
  renderNotes();
}

// ── DETAIL ───────────────────────────────────
function openDetail(id) {
  const n = notes.find(n => n.id === id);
  document.getElementById('noteDetail').classList.add('open');
  document.getElementById('notesView').style.display = 'none';
  document.getElementById('detailTitle').textContent = n.title;
  document.getElementById('detailMeta').innerHTML = `
    <span class="note-tag ${tagClass(n.tag)}">${tagLabel(n.tag)}</span>
    <span class="note-date">${fmtDate(n.created)}</span>
  `;
  document.getElementById('detailBody').textContent = n.body;
  const pdfEl = document.getElementById('detailPdf');
  if (n.pdf) {
    pdfEl.style.display = 'block';
    const link = document.getElementById('detailPdfLink');
    link.href = n.pdf;
    link.textContent = n.pdf;
  } else {
    pdfEl.style.display = 'none';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('noteDetail').classList.remove('open');
  document.getElementById('notesView').style.display = 'block';
}

// ── FILTER & RENDER ──────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNotes();
}

function renderNotes() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let filtered = notes.filter(n => {
    const matchFilter = currentFilter === 'all' || n.tag === currentFilter;
    const matchSearch = !q || n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById('noteCount').textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''} total`;

  const grid = document.getElementById('notesGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">${notes.length ? 'No notes match your search.' : 'No notes yet. Click "+ New Note" to start.'}</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(n => `
    <div class="note-card" onclick="openDetail(${n.id})">
      <div class="note-meta">
        <span class="note-date">${fmtDate(n.created)}</span>
        <span class="note-tag ${tagClass(n.tag)}">${tagLabel(n.tag)}</span>
      </div>
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-preview">${esc(n.body)}</div>
      <div class="note-footer">
        ${n.pdf ? `<span class="note-pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${n.pdf}</span>` : ''}
        <div class="note-actions" onclick="event.stopPropagation()">
          <button class="action-btn" onclick="openEditor(${n.id})">Edit</button>
          <button class="action-btn del" onclick="deleteNote(${n.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(n => n.id !== id);
  saveNotes();
  renderNotes();
}

// ── EXPORT ───────────────────────────────────
function toggleExport() {
  const box = document.getElementById('exportBox');
  box.classList.toggle('open');
  if (box.classList.contains('open')) {
    document.getElementById('exportCode').textContent = JSON.stringify(notes, null, 2);
  }
}
function copyExport() {
  navigator.clipboard.writeText(JSON.stringify(notes, null, 2));
  document.querySelector('.copy-btn').textContent = 'Copied!';
  setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy to clipboard', 2000);
}

// ── UTILS ────────────────────────────────────
function tagClass(t) { return {idea:'tag-idea',paper:'tag-paper',log:'tag-log',misc:'tag-misc'}[t]||'tag-misc'; }
function tagLabel(t) { return {idea:'💡 Idea',paper:'📄 Paper',log:'📋 Log',misc:'📌 Misc'}[t]||t; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
</script>
</body>
</html>
